workflows:

  # ─── iOS Build (macOS runner — Codemagic free tier) ─────────────────
  ios-build:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      # 1. Install frontend dependencies (always cd from repo root)
      - name: Install Node Dependencies
        script: |
          cd frontend
          npm install

      # 2. Build the React/Vite web app
      - name: Build Frontend
        script: |
          cd frontend
          npm run build

      # 3. Sync Capacitor — copies web assets into ios/ folder
      - name: Capacitor Sync iOS
        script: |
          cd frontend
          npx cap sync ios

      # 4. Install CocoaPods
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install --repo-update

      # 5. Build unsigned .app for simulator testing
      - name: Build iOS App (Debug)
        script: |
          cd frontend/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - frontend/ios/App/build/Build/Products/Debug-iphonesimulator/*.app
