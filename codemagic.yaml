workflows:

  # ─── iOS Build (macOS runner — Codemagic free tier) ─────────────────
  ios-build:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest

    scripts:
      # 1. Install frontend dependencies
      - name: Install Node Dependencies
        script: |
          cd frontend
          npm install

      # 2. Build the React/Vite web app
      - name: Build Frontend
        script: |
          cd frontend
          npm run build

      # 3. Sync Capacitor — copies web assets into ios/ folder
      - name: Capacitor Sync iOS
        script: |
          cd frontend
          npx cap sync ios

      # 4. Build iOS App using Swift Package Manager
      - name: Build iOS App (Debug Simulator)
        script: |
          cd frontend/ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath $CM_BUILD_DIR/ios_build_output \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      # 6. Zip the .app for Appetize.io
      - name: Zip for Appetize.io
        script: |
          # Search the entire build directory for ANY .app file
          APP_PATH=$(find $CM_BUILD_DIR -type d -name "*.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL ERROR: Could not find .app file! Showing xcodebuild output tree:"
            find $CM_BUILD_DIR/ios_build_output -maxdepth 4 || true
            exit 1
          fi
          
          echo "Successfully found app at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$CM_BUILD_DIR/App-Simulator.zip" "$(basename "$APP_PATH")"

    artifacts:
      - App-Simulator.zip
