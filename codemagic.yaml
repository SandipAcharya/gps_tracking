workflows:

  # ─── iOS Build (macOS runner — Codemagic free tier) ─────────────────
  ios-build:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest

    scripts:
      # 1. Install frontend dependencies
      - name: Install Node Dependencies
        script: |
          cd frontend
          npm install

      # 2. Build the React/Vite web app
      - name: Build Frontend
        script: |
          cd frontend
          npm run build

      # 3. Sync Capacitor — copies web assets into ios/ folder
      - name: Capacitor Sync iOS
        script: |
          cd frontend
          npx cap sync ios

      # 4. Build iOS App using Swift Package Manager (no CocoaPods needed for Capacitor v5+)
      - name: Build iOS App (Debug Simulator)
        script: |
          cd frontend/ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -resolvePackageDependencies \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      # 6. Zip the .app for Appetize.io
      - name: Zip for Appetize.io
        script: |
          cd frontend/ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r App-Simulator.zip *.app

    artifacts:
      - frontend/ios/App/build/Build/Products/Debug-iphonesimulator/App-Simulator.zip
