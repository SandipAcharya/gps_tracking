name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Setup Java (required for Gradle/Android builds)
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 4. Install frontend dependencies and build
      - name: Install & Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # 5. Sync Capacitor (copies web assets into android folder)
      - name: Capacitor Sync
        working-directory: frontend
        run: npx cap sync android

      # 6. Make gradlew executable
      - name: Make Gradlew Executable
        working-directory: frontend/android
        run: chmod +x gradlew

      # 7. Build Debug APK (no signing needed — perfect for testing)
      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      # 8. Upload the APK as a downloadable artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: employee-tracker-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
